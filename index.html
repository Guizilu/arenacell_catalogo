<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Catálogo ArenaCell</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- ==========================================
         CABEÇALHO
    =========================================== -->

    <header>

        <h1>
            Catálogo de preços de peças
        </h1>

        <img
            src="https://scontent.faqa1-1.fna.fbcdn.net/v/t39.30808-1/493866171_1219275223542502_8157276834584780408_n.jpg?stp=dst-jpg_tt6&cstp=mx2048x2048&ctp=s200x200&_nc_cat=106&ccb=1-7&_nc_sid=2d3e12&_nc_ohc=2ebsVx8D76sQ7kNvwE2wI4r&_nc_oc=Adqw84NXZwfx1G7tVeI67iWH9buBGd4kgiaaU_50zoVNFzmnyZDsfOfVPpBIW37Wo-Q&_nc_zt=24&_nc_ht=scontent.faqa1-1.fna&_nc_gid=VSiprxAUZHwHZvrFX3W9AA&_nc_ss=7a289&oh=00_AQCQPhoiINp40tdPGh4NAW3B7UsfrQ33jxHDcr2IiwZJdg&oe=6A671F24"
            alt="Logo ArenaCell"
        >

    </header>


    <!-- ==========================================
         CONTAINER PRINCIPAL
    =========================================== -->

    <div class="container">


        <!-- ======================================
             MENU LATERAL
        ======================================= -->

        <aside class="menu">


            <!-- Campo de pesquisa -->

            <input
                type="text"
                id="pesquisa"
                placeholder="Pesquisar modelo..."
                autocomplete="off"
            >


            <!-- ==================================
                 BOTÕES DAS MARCAS
            =================================== -->


            <button
                class="marca"
                data-marca="iphone"
                type="button"
            >

                <img
                    src="https://www.pngarts.com/files/3/Apple-iPhone-PNG-Photo.png"
                    alt="iPhone"
                >

            </button>


            <button
                class="marca"
                data-marca="samsung"
                type="button"
            >

                <img
                    src="https://pngimg.com/uploads/samsung_logo/samsung_logo_PNG9.png"
                    alt="Samsung"
                >

            </button>


            <button
                class="marca"
                data-marca="motorola"
                type="button"
            >

                <img
                    src="https://cdn.freebiesupply.com/logos/large/2x/motorola-2-logo-png-transparent.png"
                    alt="Motorola"
                >

            </button>


            <button
                class="marca"
                data-marca="xiaomi"
                type="button"
            >

                <img
                    src="https://pluspng.com/img-png/xiaomi-logo-png-xiaomi-xiaomi-logo-1024.png"
                    alt="Xiaomi"
                >

            </button>


            <button
                class="marca"
                data-marca="realme"
                type="button"
            >

                <img
                    src="https://www.freelogovectors.net/wp-content/uploads/2023/05/realme_logo-freelogovectors.net_-640x400.png"
                    alt="Realme"
                >

            </button>


            <button
                class="marca"
                data-marca="lg"
                type="button"
            >

                <img
                    src="https://logopng.com.br/logos/lg-84.svg?dpl=dpl_5qJ2bBU32D1stVmDDgeBRprAgEZc"
                    alt="LG"
                >

            </button>


            <button
                class="marca"
                data-marca="oppo"
                type="button"
            >

                <img
                    src="https://pluspng.com/img-png/oppo-logo-png-oppo-promotion-1853x700.png"
                    alt="Oppo"
                >

            </button>


        </aside>


        <!-- ======================================
             CONTEÚDO PRINCIPAL
        ======================================= -->

        <main>


            <h2 id="tituloMarca">
                Escolha uma marca
            </h2>


            <div id="conteudo">

                <p>
                    Selecione uma marca ao lado.
                </p>

            </div>


        </main>


    </div>


    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->

    <script src="script.js"></script>


</body>

</html>
